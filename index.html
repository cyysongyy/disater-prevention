<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年度辰光國小防災演練系統 - 全角色同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0F172A; color: white; font-family: 'PingFang TC', sans-serif; }
        .btn-option { transition: all 0.2s; border: 1px solid #334155; text-align: left; padding: 1.25rem; border-radius: 1rem; background: #1E293B; width: 100%; margin-bottom: 0.75rem; display: flex; align-items: center; }
        .btn-option:hover { background-color: #334155; border-color: #A3E635; transform: translateY(-2px); }
        .hidden { display: none; }
        .speech-bubble { background: #A3E635; color: #000; padding: 8px 15px; border-radius: 20px; display: inline-block; margin-bottom: 15px; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-4xl flex justify-end gap-2 mb-4">
        <button onclick="setLanguage('zh')" class="text-xs bg-slate-700 px-4 py-2 rounded-lg hover:bg-lime-500 hover:text-black transition font-bold">中文</button>
        <button onclick="setLanguage('en')" class="text-xs bg-slate-700 px-4 py-2 rounded-lg hover:bg-lime-500 hover:text-black transition font-bold">English</button>
    </div>

    <div id="info-bar" class="w-full max-w-4xl p-4 mb-6 bg-slate-800 rounded-xl border border-slate-700 flex justify-between items-center hidden">
        <div class="flex items-center">
            <span id="role-tag" class="bg-lime-500 text-black px-2 py-1 rounded text-xs font-bold mr-2"></span>
            <span id="game-time" class="text-slate-400 italic text-sm"></span>
        </div>
        <div class="text-xs text-slate-500 font-bold">📢 Disaster Preparedness Mode Active</div>
    </div>

    <div id="selector-screen" class="flex-grow flex flex-col items-center justify-center w-full">
        <h1 id="ui-title" class="text-3xl font-black mb-2 text-lime-400 text-center"></h1>
        <p id="ui-subtitle" class="text-slate-400 mb-8 text-center"></p>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 w-full max-w-4xl" id="role-grid"></div>
    </div>

    <div id="game-screen" class="w-full max-w-2xl bg-slate-800 rounded-3xl p-8 shadow-2xl border border-slate-700 hidden">
        <div id="speaking-indicator" class="speech-bubble hidden">📢 Speaking...</div>
        <h2 id="mission-title" class="text-xl font-bold text-lime-400 mb-2 border-l-4 border-lime-500 pl-3"></h2>
        <p id="scenario-desc" class="text-slate-300 leading-relaxed mb-6"></p>
        <div id="options-list"></div>
    </div>

    <div id="end-screen" class="hidden text-center flex-grow flex flex-col justify-center">
        <div class="text-7xl mb-4">🏆</div>
        <h2 id="ui-end-title" class="text-3xl font-black text-lime-400 mb-2"></h2>
        <p id="end-text" class="text-slate-400 mb-8 max-w-md mx-auto"></p>
        <button onclick="goHome()" id="ui-retry" class="bg-lime-500 text-black px-12 py-4 rounded-full font-black hover:bg-lime-400 shadow-lg"></button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby_LIIFkec6wiVn-e0xw2ongOUPX4DsH-lsybkeHzJsHwXnw-A_k4asKxYog77knIj5/exec";
        let curLang = 'zh';
        let curRole = "";
        let curStep = 0;

        const i18n = {
            zh: {
                title: "辰光防災大挑戰",
                subtitle: "依照 115.05.05 腳本執行任務[cite: 5]",
                end: "演練達成！",
                retry: "回到首頁",
                roleNames: ["指揮官", "導師", "通報組", "搶救組", "學生"],
                alert: "這不符合腳本規範或趴掩穩動作喔！[cite: 5]",
                successMsg: "演練達成！任務已成功上傳後端[cite: 5]"
            },
            en: {
                title: "Chenguang Drill Challenge",
                subtitle: "Follow the 2026.05.05 drill script[cite: 5]",
                end: "Mission Accomplished!",
                retry: "Back to Home",
                roleNames: ["Commander", "Teacher", "Comm Group", "Rescue Group", "Student"],
                alert: "Incorrect action based on drill protocol![cite: 5]",
                successMsg: "Success! Mission records have been synced[cite: 5]"
            }
        };

        const missions = {
            "zh": {
                "指揮官": [
                    { time: "09:21", title: "地震掩蔽", scenario: "地震響起，執行防護動作？", speech: "(趴下、掩護、穩住)", options: [{ icon: "🛡️", text: "立即落實趴下、掩護、穩住[cite: 5]", isCorrect: true }, { icon: "🏃", text: "直接跑出室外。", isCorrect: false }] },
                    { time: "09:26", title: "派遣搶救", scenario: "接獲回報 8 人應到 7 人實到，如何下令？", speech: "有人受困二甲，請搶救組派員進行搶救並回報。", options: [{ icon: "⛑️", text: "派遣搶救組進場並回報進度[cite: 5]", isCorrect: true }, { icon: "📞", text: "聯絡家長。", isCorrect: false }] }
                ],
                "導師": [
                    { time: "09:21", title: "掩蔽指導", scenario: "指導學生進行趴掩穩：", speech: "不要害怕，請盡量躲進桌下並穩住，保護好頭頸部。", options: [{ icon: "🛡️", text: "指導學生落實趴掩穩動作[cite: 5]", isCorrect: true }, { icon: "🚪", text: "衝向教室門口。", isCorrect: false }] },
                    { time: "09:26", title: "人數回報", scenario: "球場清點後發現缺一人：", speech: "二甲應到 8 人實到 7 人，1 人失蹤可能受困二甲，請救援。", options: [{ icon: "🚩", text: "回報：應到 8 人，實到 7 人[cite: 5]", isCorrect: true }, { icon: "✅", text: "全員到齊。", isCorrect: false }] }
                ],
                "通報組": [
                    { time: "09:29", title: "通報 119", scenario: "聯繫 119 通報傷情：", speech: "本校 1 人受傷，請求救護車由側門進入支援。", options: [{ icon: "🚑", text: "請求救護車由側門進入支援[cite: 5]", isCorrect: true }, { icon: "📱", text: "由大門進入。", isCorrect: false }] }
                ],
                "搶救組": [
                    { time: "09:27", title: "檢傷詢問", scenario: "發現傷患後的對話：", speech: "你還好嗎？哪裡不舒服？能動嗎？", options: [{ icon: "🩹", text: "詢問：你還好嗎？能動嗎？[cite: 5]", isCorrect: true }, { icon: "💪", text: "直接拉起。", isCorrect: false }] }
                ],
                "學生": [
                    { time: "09:21", title: "個人掩蔽", scenario: "聽到預警響起，第一時間應？", speech: "(執行趴下、掩護、穩住動作)", options: [{ icon: "🛡️", text: "落實趴下、掩護、穩住保護頭頸部[cite: 5]", isCorrect: true }, { icon: "🏃", text: "跑去操場。", isCorrect: false }] },
                    { time: "09:23", title: "疏散守則", scenario: "撤離過程中，學生應遵守？", speech: "不推、不語、不跑、不回頭。", options: [{ icon: "🔇", text: "遵守不推、不語、不跑、不回頭[cite: 5]", isCorrect: true }, { icon: "🗣️", text: "大聲討論。", isCorrect: false }] }
                ]
            },
            "en": {
                "Commander": [
                    { time: "09:21", title: "Shelter Protocol", scenario: "Alarm rings! What is your action?", speech: "(Drop, Cover, Hold on)", options: [{ icon: "🛡️", text: "Drop, Cover, Hold on immediately[cite: 5]", isCorrect: true }, { icon: "🏃", text: "Run outside.", isCorrect: false }] },
                    { time: "09:26", title: "Dispatch Rescue", scenario: "8 expected, 7 present. What is your order?", speech: "Someone is trapped at Room 2A. Rescue team, please dispatch and report.", options: [{ icon: "⛑️", text: "Dispatch rescue team & request report[cite: 5]", isCorrect: true }, { icon: "📞", text: "Call 119.", isCorrect: false }] }
                ],
                "Teacher": [
                    { time: "09:21", title: "Instruction", scenario: "Instruct students during quake:", speech: "Don't be afraid. Get under the table and protect your head.", options: [{ icon: "🛡️", text: "Instruct students: Drop, Cover, Hold on[cite: 5]", isCorrect: true }, { icon: "🚪", text: "Run to the door.", isCorrect: false }] },
                    { time: "09:26", title: "Roll Call", scenario: "Reporting missing student in Room 2A:", speech: "Room 2A: 8 expected, 7 present, 1 missing at Room 2A.", options: [{ icon: "🚩", text: "Report: 8 expected, 7 present[cite: 5]", isCorrect: true }, { icon: "✅", text: "All present.", isCorrect: false }] }
                ],
                "Comm Group": [
                    { time: "09:29", title: "Call 119", scenario: "Report injury to 119:", speech: "1 student injured. Requesting ambulance via SIDE gate.", options: [{ icon: "🚑", text: "Request entry via SIDE gate[cite: 5]", isCorrect: true }, { icon: "📱", text: "Enter via main gate.", isCorrect: false }] }
                ],
                "Rescue Group": [
                    { time: "09:27", title: "Triage Inquiry", scenario: "You found the student. What do you ask?", speech: "Are you okay? Where does it hurt? Can you move?", options: [{ icon: "🩹", text: "Ask: Can you move?[cite: 5]", isCorrect: true }, { icon: "💪", text: "Get up now.", isCorrect: false }] }
                ],
                "Student": [
                    { time: "09:21", title: "Safety Protocol", scenario: "Alarm rings! What is your first action?", speech: "(Drop, Cover, Hold on)", options: [{ icon: "🛡️", text: "Drop, Cover, Hold on to protect head[cite: 5]", isCorrect: true }, { icon: "🏃", text: "Run to playground.", isCorrect: false }] },
                    { time: "09:23", title: "Evacuation Rule", scenario: "During evacuation, you must follow:", speech: "No pushing, no talking, no running, no looking back.", options: [{ icon: "🔇", text: "No pushing, no talking, no running[cite: 5]", isCorrect: true }, { icon: "🗣️", text: "Talk to friends.", isCorrect: false }] }
                ]
            }
        };

        function setLanguage(lang) {
            curLang = lang;
            document.getElementById('ui-title').innerText = i18n[lang].title;
            document.getElementById('ui-subtitle').innerText = i18n[lang].subtitle;
            document.getElementById('ui-retry').innerText = i18n[lang].retry;
            document.getElementById('ui-end-title').innerText = i18n[lang].end;
            renderRoles();
        }

        function renderRoles() {
            const grid = document.getElementById('role-grid'); grid.innerHTML = "";
            const icons = ["🛡️", "🎒", "📞", "⛑️", "🧒"];
            const zhNames = ["指揮官", "導師", "通報組", "搶救組", "學生"];
            const enNames = ["Commander", "Teacher", "Comm Group", "Rescue Group", "Student"];
            i18n[curLang].roleNames.forEach((name, idx) => {
                const targetRole = curLang === 'zh' ? zhNames[idx] : enNames[idx];
                grid.innerHTML += `<button onclick="initGame('${targetRole}')" class="btn-option flex-col !items-center !text-center shadow-lg"><span class="text-4xl mb-2">${icons[idx]}</span><span class="font-bold">${name}</span></button>`;
            });
        }

        function initGame(role) {
            curRole = role; curStep = 0;
            document.getElementById('selector-screen').classList.add('hidden');
            document.getElementById('info-bar').classList.remove('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('role-tag').innerText = role;
            renderStep();
        }

        function renderStep() {
            const data = missions[curLang][curRole][curStep];
            document.getElementById('game-time').innerText = `Time: ${data.time}`;
            document.getElementById('mission-title').innerText = data.title;
            document.getElementById('scenario-desc').innerText = data.scenario;
            const list = document.getElementById('options-list'); list.innerHTML = "";
            data.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "btn-option shadow-md";
                btn.innerHTML = `<span class="text-2xl mr-4">${opt.icon}</span><span class="text-sm font-medium">${opt.text}</span>`;
                btn.onclick = () => { 
                    if(opt.isCorrect) { 
                        speak(data.speech, () => { 
                            curStep++; 
                            if(curStep < missions[curLang][curRole].length) renderStep(); 
                            else finish(); 
                        }); 
                    } else { alert(i18n[curLang].alert); }
                };
                list.appendChild(btn);
            });
        }

        function speak(text, cb) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            msg.lang = curLang === 'zh' ? 'zh-TW' : 'en-US';
            msg.voice = voices.find(v => v.lang.includes(msg.lang));
            msg.rate = 0.9;
            msg.onstart = () => document.getElementById('speaking-indicator').classList.remove('hidden');
            msg.onend = () => { document.getElementById('speaking-indicator').classList.add('hidden'); if (cb) cb(); };
            window.speechSynthesis.speak(msg);
        }

        function finish() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('end-text').innerText = i18n[curLang].successMsg;
            const payload = { playerName: "User_" + Math.floor(Math.random()*1000), role: curRole, language: curLang };
            fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        }

        function goHome() {
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('selector-screen').classList.remove('hidden');
            setLanguage(curLang);
        }

        window.speechSynthesis.onvoiceschanged = () => { console.log("Voices ready"); };
        setLanguage('zh');
    </script>
</body>
</html>
