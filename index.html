<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辰光防災大挑戰 - 互動遊戲</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0F172A; color: white; font-family: 'PingFang TC', sans-serif; }
        .card:hover { transform: scale(1.05); transition: 0.3s; cursor: pointer; }
    </style>
</head>
<body class="p-5 flex flex-col items-center justify-center min-h-screen">

    <!-- 第一關：角色挑選 -->
    <div id="setup-screen" class="text-center">
        <h1 class="text-3xl font-bold mb-8 text-lime-400">辰光防災大挑戰：角色挑選</h1>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div onclick="selectRole('指揮官')" class="card bg-slate-800 p-5 rounded-xl border-2 border-slate-700">
                <div class="text-5xl mb-3">🛡️</div>
                <h2 class="font-bold">指揮官</h2>
                <p class="text-xs text-slate-400">下達廣播與搜救指令</p>
            </div>
            <div onclick="selectRole('導師')" class="card bg-slate-800 p-5 rounded-xl border-2 border-slate-700">
                <div class="text-5xl mb-3">🎒</div>
                <h2 class="font-bold">導師</h2>
                <p class="text-xs text-slate-400">保護學生與清點人數</p>
            </div>
            <div onclick="selectRole('通報組')" class="card bg-slate-800 p-5 rounded-xl border-2 border-slate-700">
                <div class="text-5xl mb-3">📞</div>
                <h2 class="font-bold">通報組</h2>
                <p class="text-xs text-slate-400">對外聯繫與紀錄決策</p>
            </div>
            <div onclick="selectRole('搶救組')" class="card bg-slate-800 p-5 rounded-xl border-2 border-slate-700">
                <div class="text-5xl mb-3">⛑️</div>
                <h2 class="font-bold">搶救組</h2>
                <p class="text-xs text-slate-400">執行搜救與緊急醫療</p>
            </div>
        </div>
    </div>

    <!-- 第二關：腳本挑戰 (簡單範例) -->
    <div id="game-screen" class="hidden text-center max-w-lg">
        <h2 id="role-display" class="text-xl text-lime-400 mb-4 font-bold"></h2>
        <div class="bg-slate-800 p-6 rounded-xl shadow-2xl mb-5">
            <p id="scenario-text" class="text-lg mb-6"></p>
            <div id="options" class="flex flex-col gap-3"></div>
        </div>
        <p class="text-slate-500 text-sm italic">時間正在倒數：09:21 AM...</p>
    </div>

    <!-- 結束畫面 -->
    <div id="end-screen" class="hidden text-center">
        <h2 class="text-3xl font-bold text-lime-400 mb-5">挑戰完成！</h2>
        <p class="mb-5">資料正自動同步至 Google Sheet...</p>
        <button onclick="location.reload()" class="bg-lime-500 text-black px-6 py-2 rounded-full font-bold">再玩一次</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby_LIIFkec6wiVn-e0xw2ongOUPX4DsH-lsybkeHzJsHwXnw-A_k4asKxYog77knIj5/exec";
        let gameState = {
            playerName: "玩家",
            role: "",
            totalTime: "04:21",
            successRate: "100%",
            missingFound: "是",
            commStatus: "是",
            language: "中"
        };

        function selectRole(role) {
            gameState.role = role;
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('role-display').innerText = `目前身分：${role}`;
            startChallenge();
        }

        function startChallenge() {
            const scenario = "地震預警響起，身為" + gameState.role + "，你第一句話會說什麼？";
            document.getElementById('scenario-text').innerText = scenario;
            
            const options = {
                "指揮官": ["全校疏散至綜合球場！", "大家原地不要動！"],
                "導師": ["躲進桌下穩住，保護頭頸部！", "快點跑出去！"],
                "通報組": ["聯繫媽祖醫院支援！", "先拍照發社群！"],
                "搶救組": ["準備進入二甲搜救！", "在操場等指令！"]
            };

            const div = document.getElementById('options');
            options[gameState.role].forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "bg-slate-700 hover:bg-slate-600 p-3 rounded-lg text-left";
                btn.innerText = opt;
                btn.onclick = () => endGame();
                div.appendChild(btn);
            });
        }

        function endGame() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            saveToSheet();
        }

        function saveToSheet() {
            // 使用 no-cors 避免跨網域問題 (但無法讀取回傳值)
            // 建議使用上述部署時選擇「所有人」存取
            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(gameState)
            }).then(() => {
                console.log("資料已成功寫入！");
            }).catch(err => console.error("寫入失敗：", err));
        }
    </script>
</body>
</html>
