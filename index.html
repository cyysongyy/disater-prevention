<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年度辰光國小防災演練系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0F172A; color: white; font-family: 'PingFang TC', sans-serif; }
        .btn-option { transition: all 0.2s; border: 1px solid #334155; text-align: left; padding: 1.25rem; border-radius: 1rem; background: #1E293B; width: 100%; margin-bottom: 0.75rem; display: flex; align-items: center; }
        .btn-option:hover { background-color: #334155; border-color: #A3E635; transform: translateY(-2px); }
        .hidden { display: none; }
        .speech-bubble { background: #A3E635; color: #000; padding: 8px 15px; border-radius: 20px; display: inline-block; margin-bottom: 15px; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- 語言切換 -->
    <div class="w-full max-w-4xl flex justify-end gap-2 mb-4">
        <button onclick="setLanguage('zh')" class="text-xs bg-slate-700 px-3 py-1 rounded hover:bg-lime-500 hover:text-black transition">中文</button>
        <button onclick="setLanguage('en')" class="text-xs bg-slate-700 px-3 py-1 rounded hover:bg-lime-500 hover:text-black transition">English</button>
    </div>

    <!-- 頂部狀態 -->
    <div id="info-bar" class="w-full max-w-4xl p-4 mb-6 bg-slate-800 rounded-xl border border-slate-700 flex justify-between items-center hidden">
        <div class="flex items-center">
            <span id="role-tag" class="bg-lime-500 text-black px-2 py-1 rounded text-xs font-bold mr-2"></span>
            <span id="game-time" class="text-slate-400 italic text-sm"></span>
        </div>
        <div id="ui-speaking" class="text-xs text-slate-500 font-bold">🔊 Voice On</div>
    </div>

    <!-- 1. 角色選擇 -->
    <div id="selector-screen" class="flex-grow flex flex-col items-center justify-center">
        <h1 id="ui-title" class="text-3xl font-black mb-2 text-lime-400 text-center">辰光防災大挑戰</h1>
        <p id="ui-subtitle" class="text-slate-400 mb-8 text-center">請選擇角色進入 115.05.05 演練現場[cite: 3, 5]</p>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 w-full max-w-4xl" id="role-grid">
            <!-- 由 JS 生成角色按鈕 -->
        </div>
    </div>

    <!-- 2. 遊戲主畫面 -->
    <div id="game-screen" class="w-full max-w-2xl bg-slate-800 rounded-3xl p-8 shadow-2xl border border-slate-700 hidden">
        <div id="speaking-indicator" class="speech-bubble hidden">📢 Speaking...</div>
        <h2 id="mission-title" class="text-xl font-bold text-lime-400 mb-2 border-l-4 border-lime-500 pl-3"></h2>
        <p id="scenario-desc" class="text-slate-300 leading-relaxed mb-6"></p>
        <div id="options-list"></div>
    </div>

    <!-- 3. 完成畫面 -->
    <div id="end-screen" class="hidden text-center flex-grow flex flex-col justify-center">
        <div class="text-7xl mb-4">🏆</div>
        <h2 id="ui-end-title" class="text-3xl font-black text-lime-400 mb-2">演練成功！</h2>
        <p id="end-text" class="text-slate-400 mb-8 max-w-md mx-auto"></p>
        <button onclick="location.reload()" id="ui-retry" class="bg-lime-500 text-black px-12 py-4 rounded-full font-black hover:bg-lime-400">重新挑戰</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby_LIIFkec6wiVn-e0xw2ongOUPX4DsH-lsybkeHzJsHwXnw-A_k4asKxYog77knIj5/exec";
        let curLang = 'zh';
        let curRole = "";
        let curStep = 0;

        const i18n = {
            zh: { title: "辰光防災大挑戰", subtitle: "依照 115.05.05 腳本執行任務[cite: 3, 5]", end: "演練成功！", retry: "重新挑戰", speaking: "正在播放引導語...", roles: ["指揮官", "導師", "通報組", "搶救組", "學生"] },
            en: { title: "Chenguang Disaster Challenge", subtitle: "Execute missions based on 2026.05.05 script[cite: 3, 5]", end: "Mission Accomplished!", retry: "Retry", speaking: "Speaking...", roles: ["Commander", "Teacher", "Comm Group", "Rescue Group", "Student"] }
        };

        const missions = {
            "zh": {
                "指揮官": [
                    { time: "09:22", title: "發布疏散廣播[cite: 3]", scenario: "主震暫歇，你必須下令全校疏散，你的動作是？", speech: "全校師生請注意，目前地震已暫時停止，請大家保持鎮定不要慌張，請老師運用主震暫歇時間攜帶防災背包及安全頭盔引導學生疏散至綜合球場。", options: [{ icon: "📢", text: "吹哨一長四短並廣播引導語[cite: 3, 5]", isCorrect: true }, { icon: "🏃", text: "大喊：大家快跑！", isCorrect: false }] }
                ],
                "通報組": [
                    { time: "09:29", title: "對外通報 119[cite: 3]", scenario: "聯繫 119 請求支援受傷學生，你的台詞是？", speech: "本校因地震影響有 1 位學生受傷，目前已送至救護站進行初步處理，請求派遣救護車從側門進入支援。", options: [{ icon: "🚑", text: "通報：1人受傷，請求救護車從正門進入支援[cite: 3]", isCorrect: true }, { icon: "📱", text: "通報：快來救人。", isCorrect: false }] }
                ]
                // ... 其他角色以此類推
            },
            "en": {
                "Commander": [
                    { time: "09:22", title: "Broadcast", scenario: "Earthquake stopped, what do you say?", speech: "Attention everyone, the earthquake has stopped. Please stay calm and follow teachers to the ball court.", options: [{ icon: "📢", text: "Broadcast to Ball Court[cite: 3, 5]", isCorrect: true }, { icon: "🏃", text: "Run now!", isCorrect: false }] }
                ]
            }
        };

        function setLanguage(lang) {
            curLang = lang;
            document.getElementById('ui-title').innerText = i18n[lang].title;
            document.getElementById('ui-subtitle').innerText = i18n[lang].subtitle;
            renderRoles();
        }

        function renderRoles() {
            const grid = document.getElementById('role-grid');
            grid.innerHTML = "";
            const icons = ["🛡️", "🎒", "📞", "⛑️", "🧒"];
            i18n[curLang].roles.forEach((name, idx) => {
                grid.innerHTML += `<button onclick="initGame('${name}')" class="btn-option flex-col !items-center !text-center"><span class="text-4xl mb-2">${icons[idx]}</span><span class="font-bold">${name}</span></button>`;
            });
        }

        function initGame(role) {
            curRole = role; curStep = 0;
            document.getElementById('selector-screen').classList.add('hidden');
            document.getElementById('info-bar').classList.remove('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('role-tag').innerText = role;
            renderStep();
        }

        function renderStep() {
            const data = missions[curLang][curRole][curStep];
            document.getElementById('game-time').innerText = `Time: ${data.time}`;
            document.getElementById('mission-title').innerText = data.title;
            document.getElementById('scenario-desc').innerText = data.scenario;
            const list = document.getElementById('options-list');
            list.innerHTML = "";
            data.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "btn-option";
                btn.innerHTML = `<span class="text-2xl mr-4">${opt.icon}</span><span>${opt.text}</span>`;
                btn.onclick = () => { if(opt.isCorrect) { speak(data.speech, () => { curStep++; if(curStep < missions[curLang][curRole].length) renderStep(); else finish(); }); } else alert("Error!"); };
                list.appendChild(btn);
            });
        }

        function speak(text, cb) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = curLang === 'zh' ? 'zh-TW' : 'en-US';
            msg.onstart = () => document.getElementById('speaking-indicator').classList.remove('hidden');
            msg.onend = () => { document.getElementById('speaking-indicator').classList.add('hidden'); if(cb) cb(); };
            window.speechSynthesis.speak(msg);
        }

        function finish() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            
            // 重要：修正後端寫入欄位名稱
            const payload = {
                playerName: "User_" + Math.floor(Math.random()*1000),
                role: curRole,
                totalTime: "05:00",
                successRate: "100%",
                missingFound: "是",
                commStatus: "是",
                language: curLang
            };

            fetch(SCRIPT_URL, {
                method: "POST",
                mode: "no-cors", // 重要：Google Script 必須使用 no-cors
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
        }

        setLanguage('zh');
    </script>
</body>
</html>
