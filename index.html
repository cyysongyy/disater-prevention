<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年度辰光國小防災演練 - 最終修正版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0F172A; color: white; font-family: 'PingFang TC', sans-serif; }
        .btn-option { transition: all 0.2s; border: 1px solid #334155; text-align: left; padding: 1.25rem; border-radius: 1rem; background: #1E293B; width: 100%; margin-bottom: 0.75rem; display: flex; align-items: center; }
        .btn-option:hover { background-color: #334155; border-color: #A3E635; transform: translateY(-2px); }
        .hidden { display: none; }
        .speech-bubble { background: #A3E635; color: #000; padding: 8px 15px; border-radius: 20px; display: inline-block; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- 語言切換 -->
    <div class="w-full max-w-4xl flex justify-end gap-2 mb-4">
        <button onclick="setLanguage('zh')" class="text-xs bg-slate-700 px-4 py-2 rounded-lg hover:bg-lime-500 hover:text-black transition font-bold">中文</button>
        <button onclick="setLanguage('en')" class="text-xs bg-slate-700 px-4 py-2 rounded-lg hover:bg-lime-500 hover:text-black transition font-bold">English</button>
    </div>

    <!-- 頂部資訊欄 -->
    <div id="info-bar" class="w-full max-w-4xl p-4 mb-6 bg-slate-800 rounded-xl border border-slate-700 flex justify-between items-center hidden">
        <div class="flex items-center">
            <span id="role-tag" class="bg-lime-500 text-black px-2 py-1 rounded text-xs font-bold mr-2"></span>
            <span id="game-time" class="text-slate-400 italic text-sm"></span>
        </div>
        <div class="text-xs text-slate-500 font-bold">📢 115.05.05 腳本同步 (後端傳輸已就緒)[cite: 7]</div>
    </div>

    <!-- 1. 角色選擇 -->
    <div id="selector-screen" class="flex-grow flex flex-col items-center justify-center w-full">
        <h1 id="ui-title" class="text-3xl font-black mb-2 text-lime-400 text-center">辰光防災大挑戰</h1>
        <p id="ui-subtitle" class="text-slate-400 mb-8 text-center">請選擇角色開始演練[cite: 7]</p>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 w-full max-w-4xl" id="role-grid"></div>
    </div>

    <!-- 2. 遊戲主畫面 -->
    <div id="game-screen" class="w-full max-w-2xl bg-slate-800 rounded-3xl p-8 shadow-2xl border border-slate-700 hidden">
        <div id="speaking-indicator" class="speech-bubble hidden">📢 Speaking...</div>
        <h2 id="mission-title" class="text-xl font-bold text-lime-400 mb-2 border-l-4 border-lime-500 pl-3"></h2>
        <p id="scenario-desc" class="text-slate-300 leading-relaxed mb-6"></p>
        <div id="options-list"></div>
    </div>

    <!-- 3. 完成畫面 -->
    <div id="end-screen" class="hidden text-center flex-grow flex flex-col justify-center">
        <div class="text-7xl mb-4">🏆</div>
        <h2 id="ui-end-title" class="text-3xl font-black text-lime-400 mb-2">演練成功！</h2>
        <p id="end-text" class="text-slate-400 mb-8 max-w-md mx-auto"></p>
        <button onclick="goHome()" id="ui-retry" class="bg-lime-500 text-black px-12 py-4 rounded-full font-black hover:bg-lime-400 shadow-lg">回到首頁</button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby_LIIFkec6wiVn-e0xw2ongOUPX4DsH-lsybkeHzJsHwXnw-A_k4asKxYog77knIj5/exec";
        let curLang = 'zh';
        let curRole = "";
        let curStep = 0;

        const missions = {
            "zh": {
                "指揮官": [
                    { time: "09:21", title: "地震初期防護", scenario: "地震預警聲響起，身為指揮官第一動作？", speech: "(立即就地掩蔽，執行趴下、掩護、穩住)", options: [{ icon: "🛡️", text: "落實「趴下、掩護、穩住」保護頭部[cite: 7]", isCorrect: true }, { icon: "🏃", text: "跑去開門。", isCorrect: false }] },
                    { time: "09:22", title: "疏散廣播下達", scenario: "主震暫歇，你應發布全校廣播指令：", speech: "全校師生請注意，目前地震已暫時停止，請大家保持鎮定，請老師運用主震暫歇時間引導學生疏散至綜合球場。", options: [{ icon: "📢", text: "廣播疏散指令並吹哨一長四短[cite: 7]", isCorrect: true }, { icon: "🗣️", text: "直接大喊撤離。", isCorrect: false }] },
                    { time: "09:26", title: "派遣搜救任務", scenario: "接獲二甲「應到 8 人，實到 7 人」回報，你的指令？", speech: "目前有人失蹤受困，請搶救組派員進入二甲進行搶救並回報救援狀況。", options: [{ icon: "⛑️", text: "派遣搶救組搜救並要求回報狀況[cite: 7]", isCorrect: true }, { icon: "📞", text: "請主任處理。", isCorrect: false }] },
                    { time: "09:30", title: "災後安置決策", scenario: "評估校舍損壞情形後，你下令：", speech: "評估後校舍無大損傷，召集組長討論後決定正常回教室上課。", options: [{ icon: "🏢", text: "下令全校師生正常回教室上課[cite: 7]", isCorrect: true }, { icon: "🛑", text: "決定暫時停止上課。", isCorrect: false }] }
                ],
                "通報組": [
                    { time: "09:29", title: "1. 119 通報支援", scenario: "撥打 119 通報傷患與側門引導：", speech: "本校有 1 位學生受傷，請求派遣救護車由側門進入支援。", options: [{ icon: "🚑", text: "請求救護車由側門進入支援[cite: 7]", isCorrect: true }, { icon: "🚪", text: "由正門進入。", isCorrect: false }] },
                    { time: "09:29", title: "2. 通知學生家長", scenario: "聯繫受傷學生家長通報送醫狀況：", speech: "這裡是辰光國小，您的孩子已由救護車送往媽祖醫院救傷，請前往協助。", options: [{ icon: "📞", text: "告知送往「媽祖醫院」救傷[cite: 7]", isCorrect: true }, { icon: "🏘️", text: "請來校接走學生。", isCorrect: false }] },
                    { time: "09:35", title: "3. 通報應變中心", scenario: "向雲林縣災害應變中心彙整回報：", speech: "應變中心您好：本次建物無大損傷；一學生受傷已處理，人員安置中。", options: [{ icon: "🏢", text: "彙整回報建物與人員安置現況[cite: 7]", isCorrect: true }, { icon: "📝", text: "演練結束。", isCorrect: false }] }
                ],
                "搶救組": [
                    { time: "09:22", title: "1. 裝備整備階段", scenario: "疏散至球場後的首要任務？", speech: "清點物資、回報人數，協助護理師搬運長背板及急救物資。", options: [{ icon: "📦", text: "清點物資、搬運長背板並回報人數[cite: 7]", isCorrect: true }, { icon: "🏃", text: "直接進場。", isCorrect: false }] },
                    { time: "09:26", title: "2. 校舍巡檢回報", scenario: "進行校舍外觀巡視後的通報語：", speech: "外觀檢查回報：目前北棟教室外牆有碎石掉落情形，其餘無異狀。", options: [{ icon: "🏢", text: "回報北棟碎石，其餘異狀[cite: 7]", isCorrect: true }, { icon: "✅", text: "全校安全。", isCorrect: false }] },
                    { time: "09:27", title: "3. 進場搜救通報", scenario: "準備進入二甲教室搜救前：", speech: "呼叫指揮中心：目前北棟無危險，由王怡文與蔡幸華進入二甲救援。", options: [{ icon: "📻", text: "通報王怡文、蔡幸華進場搜救[cite: 7]", isCorrect: true }, { icon: "🚪", text: "直接進入。", isCorrect: false }] },
                    { time: "09:27", title: "4. 發現傷患檢傷", scenario: "發現受傷學生，你的首要對話？", speech: "你還好嗎? 哪裡覺得不舒服? 能動嗎?", options: [{ icon: "🩹", text: "檢傷詢問：你還好嗎？能動嗎？[cite: 7]", isCorrect: true }, { icon: "🗣️", text: "快跟我走。", isCorrect: false }] },
                    { time: "09:29", title: "5. 引導送醫協作", scenario: "傷患救回後，如何安排後送？", speech: "回報傷情，請護理師及導師陪同送醫並攜帶學生通訊資料。", options: [{ icon: "🚑", text: "安排導師攜帶通訊資料陪同送醫[cite: 7]", isCorrect: true }, { icon: "🏠", text: "自行送醫。", isCorrect: false }] }
                ],
                "導師": [
                    { time: "09:21", title: "教室掩蔽引導", scenario: "警報響起，對班級學生喊話：", speech: "各位同學不要害怕，請盡量躲進桌下並穩住，保護好頭頸部。", options: [{ icon: "🛡️", text: "指導學生執行「趴下、掩護、穩住」[cite: 7]", isCorrect: true }, { icon: "🏃", text: "帶隊撤離。", isCorrect: false }] },
                    { time: "09:26", title: "人數清點回報", scenario: "抵達球場發現缺一人，如何向中心回報？", speech: "報告點名結果：二甲應到 8 人，實到 7 人，1 人失蹤可能受困二甲。", options: [{ icon: "🚩", text: "回報：應到 8 人，實到 7 人[cite: 7]", isCorrect: true }, { icon: "✅", text: "全員安全。", isCorrect: false }] }
                ],
                "學生": [
                    { time: "09:21", title: "落實趴掩穩", scenario: "預警響起，學生應立即採取？", speech: "(執行趴下、掩護、穩住動作)", options: [{ icon: "🛡️", text: "落實「趴、掩、穩」保護頭頸部[cite: 7]", isCorrect: true }, { icon: "🏃", text: "跑去教室外。", isCorrect: false }] },
                    { time: "09:23", title: "疏散三不守則", scenario: "撤離過程中應嚴守？", speech: "不推、不語、不跑、不回頭。", options: [{ icon: "🔇", text: "遵守不推、不語、不跑、不回頭[cite: 7]", isCorrect: true }, { icon: "🗣️", text: "討論地震。", isCorrect: false }] }
                ]
            },
            "en": {
                "Commander": [
                    { time: "09:21", title: "Awareness", scenario: "Alarm rings! First action?", speech: "(Drop, Cover, Hold on)", options: [{ icon: "🛡️", text: "Drop, Cover, and Hold on[cite: 7]", isCorrect: true }, { icon: "🏃", text: "Run out.", isCorrect: false }] },
                    { time: "09:30", title: "Decision", scenario: "After assessment, your final decision?", speech: "The building is safe. We will go back to the classroom.", options: [{ icon: "🏢", text: "Return to the classroom[cite: 7]", isCorrect: true }, { icon: "🛑", text: "Suspend classes.", isCorrect: false }] }
                ],
                "Teacher": [
                    { time: "09:26", title: "Roll Call", scenario: "Report numbers at the assembly area:", speech: "Room 2A: 8 expected, 7 present, 1 missing at Room 2A.", options: [{ icon: "🚩", text: "Report: 8 expected, 7 present[cite: 7]", isCorrect: true }, { icon: "✅", text: "All safe.", isCorrect: false }] }
                ],
                "Student": [
                    { time: "09:21", title: "Protocol", scenario: "Alarm rings! First action?", speech: "(Drop, Cover, Hold on)", options: [{ icon: "🛡️", text: "Drop, Cover, Hold on[cite: 7]", isCorrect: true }, { icon: "🏃", text: "Run out.", isCorrect: false }] }
                ],
                "Rescue Group": [
                    { time: "09:27", title: "Triage", scenario: "Found injured student:", speech: "Are you okay? Can you move?", options: [{ icon: "🩹", text: "Ask: Can you move?[cite: 7]", isCorrect: true }, { icon: "🚨", text: "Carry them.", isCorrect: false }] }
                ],
                "Comm Group": [
                    { time: "09:29", title: "Report 119", scenario: "Contacting 119 support:", speech: "Injured student. Please enter via SIDE gate.", options: [{ icon: "🚑", text: "Entry via SIDE gate[cite: 7]", isCorrect: true }, { icon: "🚪", text: "Main gate.", isCorrect: false }] }
                ]
            }
        };

        function setLanguage(lang) {
            curLang = lang;
            document.getElementById('ui-title').innerText = curLang === 'zh' ? "辰光防災大挑戰" : "Drill Challenge";
            document.getElementById('ui-subtitle').innerText = curLang === 'zh' ? "依照 115.05.05 腳本執行任務[cite: 7]" : "Follow 2026.05.05 script[cite: 7]";
            renderRoles();
        }

        function renderRoles() {
            const grid = document.getElementById('role-grid'); grid.innerHTML = "";
            const icons = ["🛡️", "🎒", "📞", "⛑️", "🧒"];
            const zhNames = ["指揮官", "導師", "通報組", "搶救組", "學生"];
            const enNames = ["Commander", "Teacher", "Comm Group", "Rescue Group", "Student"];
            const names = curLang === 'zh' ? zhNames : enNames;
            names.forEach((name, idx) => {
                grid.innerHTML += `<button onclick="initGame('${zhNames[idx]}')" class="btn-option flex-col !items-center !text-center shadow-lg"><span class="text-4xl mb-2">${icons[idx]}</span><span class="font-bold">${name}</span></button>`;
            });
        }

        function initGame(role) {
            curRole = role; curStep = 0;
            document.getElementById('selector-screen').classList.add('hidden');
            document.getElementById('info-bar').classList.remove('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('role-tag').innerText = curRole;
            renderStep();
        }

        function renderStep() {
            const data = missions[curLang][curRole][curStep];
            document.getElementById('game-time').innerText = `Time: ${data.time}`;
            document.getElementById('mission-title').innerText = data.title;
            document.getElementById('scenario-desc').innerText = data.scenario;
            const list = document.getElementById('options-list'); list.innerHTML = "";
            data.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "btn-option shadow-md";
                btn.innerHTML = `<span class="text-2xl mr-4">${opt.icon}</span><span class="text-sm font-medium">${opt.text}</span>`;
                btn.onclick = () => { 
                    if(opt.isCorrect) { 
                        speak(data.speech, () => { 
                            curStep++; 
                            if(curStep < missions[curLang][curRole].length) renderStep(); 
                            else finish(); 
                        }); 
                    } else { alert("動作不符腳本規範！請重新選擇[cite: 7]"); }
                };
                list.appendChild(btn);
            });
        }

        function speak(text, cb) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = curLang === 'zh' ? 'zh-TW' : 'en-US';
            msg.onend = () => { if (cb) cb(); };
            window.speechSynthesis.speak(msg);
        }

        function finish() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('end-text').innerText = curLang === 'zh' ? "演練圓滿達成！決策紀錄已同步[cite: 7]" : "Success! Data synced[cite: 7]";
            const payload = { role: curRole, decision: "Return to Classroom", lang: curLang };
            fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        }

        function goHome() {
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('selector-screen').classList.remove('hidden');
            setLanguage(curLang);
        }

        setLanguage('zh');
    </script>
</body>
</html>
