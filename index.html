  <!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年度辰光國小防災演練系統 - 通報強化版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0F172A; color: white; font-family: 'PingFang TC', sans-serif; }
        .btn-option { transition: all 0.2s; border: 1px solid #334155; text-align: left; padding: 1.25rem; border-radius: 1rem; background: #1E293B; width: 100%; margin-bottom: 0.75rem; display: flex; align-items: center; }
        .btn-option:hover { background-color: #334155; border-color: #A3E635; transform: translateY(-2px); }
        .hidden { display: none; }
        .speech-bubble { background: #A3E635; color: #000; padding: 8px 15px; border-radius: 20px; display: inline-block; margin-bottom: 15px; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- 語言切換 -->
    <div class="w-full max-w-4xl flex justify-end gap-2 mb-4">
        <button onclick="setLanguage('zh')" class="text-xs bg-slate-700 px-4 py-2 rounded-lg hover:bg-lime-500 hover:text-black transition font-bold">中文</button>
        <button onclick="setLanguage('en')" class="text-xs bg-slate-700 px-4 py-2 rounded-lg hover:bg-lime-500 hover:text-black transition font-bold">English</button>
    </div>

    <!-- 頂部狀態 -->
    <div id="info-bar" class="w-full max-w-4xl p-4 mb-6 bg-slate-800 rounded-xl border border-slate-700 flex justify-between items-center hidden">
        <div class="flex items-center">
            <span id="role-tag" class="bg-lime-500 text-black px-2 py-1 rounded text-xs font-bold mr-2"></span>
            <span id="game-time" class="text-slate-400 italic text-sm"></span>
        </div>
        <div id="ui-voice-mode" class="text-xs text-slate-500 font-bold">📢 語音與後端紀錄已就緒</div>
    </div>

    <!-- 1. 角色選擇 -->
    <div id="selector-screen" class="flex-grow flex flex-col items-center justify-center w-full">
        <h1 id="ui-title" class="text-3xl font-black mb-2 text-lime-400 text-center"></h1>
        <p id="ui-subtitle" class="text-slate-400 mb-8 text-center"></p>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 w-full max-w-4xl" id="role-grid"></div>
    </div>

    <!-- 2. 遊戲主畫面 -->
    <div id="game-screen" class="w-full max-w-2xl bg-slate-800 rounded-3xl p-8 shadow-2xl border border-slate-700 hidden">
        <div id="speaking-indicator" class="speech-bubble hidden">📢 Speaking...</div>
        <h2 id="mission-title" class="text-xl font-bold text-lime-400 mb-2 border-l-4 border-lime-500 pl-3"></h2>
        <p id="scenario-desc" class="text-slate-300 leading-relaxed mb-6"></p>
        <div id="options-list"></div>
    </div>

    <!-- 3. 完成畫面 -->
    <div id="end-screen" class="hidden text-center flex-grow flex flex-col justify-center">
        <div class="text-7xl mb-4">🏆</div>
        <h2 id="ui-end-title" class="text-3xl font-black text-lime-400 mb-2"></h2>
        <p id="end-text" class="text-slate-400 mb-8 max-w-md mx-auto"></p>
        <button onclick="goHome()" id="ui-retry" class="bg-lime-500 text-black px-12 py-4 rounded-full font-black hover:bg-lime-400 shadow-lg"></button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby_LIIFkec6wiVn-e0xw2ongOUPX4DsH-lsybkeHzJsHwXnw-A_k4asKxYog77knIj5/exec";
        let curLang = 'zh';
        let curRole = "";
        let curStep = 0;

        const i18n = {
            zh: {
                title: "辰光防災大挑戰",
                subtitle: "依照 115.05.05 腳本執行任務[cite: 5]",
                speaking: "正在播放語音...",
                end: "演練成功！",
                retry: "回到首頁",
                roleNames: ["指揮官", "導師", "通報組", "搶救組", "學生"],
                alert: "這不符合腳本規範或「趴掩穩」喔！[cite: 5]",
                successMsg: "演練達成！已依照腳本成功完成所有任務並寫入紀錄[cite: 5]"
            },
            en: {
                title: "Chenguang Drill Challenge",
                subtitle: "Based on 2026.05.05 Drill Script[cite: 5]",
                speaking: "Voice playing...",
                end: "Mission Accomplished!",
                retry: "Back to Home",
                roleNames: ["Commander", "Teacher", "Comm Group", "Rescue Group", "Student"],
                alert: "Not following script or protocol![cite: 5]",
                successMsg: "Success! Tasks completed and data synced[cite: 5]"
            }
        };

        const missions = {
            "zh": {
                "指揮官": [
                    { time: "09:21", title: "地震覺察掩蔽", scenario: "預警聲響起，你在辦公室應採取的首要動作？", speech: "(執行趴下掩護穩住動作)", options: [{ icon: "🛡️", text: "立即落實「趴下、掩護、穩住」[cite: 5]", isCorrect: true }, { icon: "🏃", text: "直接跑出室外。", isCorrect: false }] },
                    { time: "09:22", title: "疏散廣播下達", scenario: "主震暫歇，你應發布全校廣播指令：", speech: "全校師生請注意，目前地震已暫時停止，請大家保持鎮定不要慌張，請老師運用主震暫歇時間攜帶防災背包及安全頭盔引導學生疏散至綜合球場。", options: [{ icon: "📢", text: "吹哨一長四短並廣播疏散引導語[cite: 5]", isCorrect: true }, { icon: "🗣️", text: "大喊快跑。", isCorrect: false }] },
                    { time: "09:26", title: "派遣搜救任務", scenario: "清點人數後，接獲導師回報失蹤，你的指令？", speech: "清點後發現有人受困於二甲教室，請搶救組派員進行搶救並回報救援狀況。", options: [{ icon: "⛑️", text: "下令派組搜救並要求回報救援進度[cite: 5]", isCorrect: true }, { icon: "📞", text: "請通報組去看看。", isCorrect: false }] }
                ],
                "通報組": [
                    { time: "09:29", title: "1. 撥打119通報", scenario: "接獲傷患訊息，立即向 119 通報請求支援：", speech: "本校有 1 位學生受傷，目前已送至救護站，請求派遣救護車從側門進入支援。", options: [{ icon: "🚑", text: "請求救護車由「側門」進入支援[cite: 5]", isCorrect: true }, { icon: "🚪", text: "由大門進入。", isCorrect: false }] },
                    { time: "09:29", title: "2. 通知學生家長", scenario: "緊接著，電話聯繫受傷學生的家長：", speech: "您好：這裡是辰光國小，您的孩子因地震逃生受傷，目前由救護車送往媽祖醫院救傷，請前往協助。", options: [{ icon: "📞", text: "告知送往「媽祖醫院」救傷[cite: 5]", isCorrect: true }, { icon: "🏘️", text: "請家長自行接走學生。", isCorrect: false }] },
                    { time: "09:35", title: "3. 通報防救中心", scenario: "演練最後，向雲林縣災害應變中心彙整回報：", speech: "應變中心您好：辰光國小建物無大損傷；一學生受傷已完成處理，人員目前在避難集合地點。", options: [{ icon: "🏢", text: "回報建物無損、人員目前安置狀況[cite: 5]", isCorrect: true }, { icon: "📝", text: "學校目前沒事了。", isCorrect: false }] }
                ],
                "導師": [
                    { time: "09:21", title: "班級掩蔽指導", scenario: "地震發生，你在教室應如何指導學生？", speech: "老師：各位同學不要害怕，請盡量躲進桌下並穩住，保護好頭頸部。", options: [{ icon: "🛡️", text: "指導學生執行就地掩蔽「趴掩穩」[cite: 5]", isCorrect: true }, { icon: "🚪", text: "叫學生排隊準備撤離。", isCorrect: false }] },
                    { time: "09:26", title: "人數統計回報", scenario: "抵達球場清點人數，發現缺一人，如何向指揮官回報？", speech: "回報點名結果：二甲應到 8 人，實到 7 人，1 人失蹤可能受困二甲。", options: [{ icon: "🚩", text: "回報：應到 8 人，實到 7 人[cite: 5]", isCorrect: true }, { icon: "✅", text: "舉綠卡回報全員到齊。", isCorrect: false }] }
                ],
                "搶救組": [
                    { time: "09:26", title: "建物安全巡視", scenario: "清點裝備後執行巡查，向指揮中心回報：", speech: "外觀巡查回報：目前北棟教室外牆有碎石掉落，其餘建物無異狀。", options: [{ icon: "🏢", text: "回報北棟受損，其餘尚無異狀[cite: 5]", isCorrect: true }, { icon: "❌", text: "全部回報正常。", isCorrect: false }] },
                    { time: "09:27", title: "傷患搜救對話", scenario: "在二甲發現受困傷患，你的檢傷詢問？", speech: "你還好嗎？哪裡覺得不舒服？能動嗎？", options: [{ icon: "🩹", text: "詢問：你還好嗎？能動嗎？[cite: 5]", isCorrect: true }, { icon: "💪", text: "直接拉起傷患。", isCorrect: false }] }
                ],
                "學生": [
                    { time: "09:21", title: "落實趴掩穩", scenario: "預警響起，學生第一時間應執行？", speech: "(執行趴下掩護穩住動作，保護頭頸部)", options: [{ icon: "🛡️", text: "落實趴下、掩護、穩住[cite: 5]", isCorrect: true }, { icon: "🗣️", text: "尖叫並跑向門口。", isCorrect: false }] },
                    { time: "09:23", title: "疏散三不原則", scenario: "撤離過程中，學生應嚴守？", speech: "不推、不語、不跑、不回頭。", options: [{ icon: "🔇", text: "嚴守「不推、不語、不跑、不回頭」[cite: 5]", isCorrect: true }, { icon: "🗣️", text: "跟同學討論剛剛的地震。", isCorrect: false }] }
                ]
            },
            "en": {
                "Comm Group": [
                    { time: "09:29", title: "1. Call 119", scenario: "Contacting 119 for medical support:", speech: "Ambulance requested. Please enter via the SIDE gate.", options: [{ icon: "🚑", text: "Request entry via SIDE gate[cite: 5]", isCorrect: true }, { icon: "🚪", text: "Enter via main gate.", isCorrect: false }] },
                    { time: "09:35", title: "2. Report to EOC", scenario: "Reporting to the Emergency Center:", speech: "School building is safe; 1 injured and treated. Students are at the assembly area.", options: [{ icon: "🏢", text: "Report safety status and assembly location[cite: 5]", isCorrect: true }, { icon: "📝", text: "Everything is fine.", isCorrect: false }] }
                ],
                "Commander": [
                    { time: "09:21", title: "Awareness", scenario: "Alarm rings! Your first action?", speech: "(Drop, Cover, Hold on)", options: [{ icon: "🛡️", text: "Drop, Cover, Hold on[cite: 5]", isCorrect: true }, { icon: "🏃", text: "Run outside.", isCorrect: false }] }
                ],
                "Teacher": [
                    { time: "09:26", title: "Report", scenario: "Roll call at assembly area:", speech: "Room 2A: 8 expected, 7 present, 1 missing.", options: [{ icon: "🚩", text: "Report: 8 expected, 7 present[cite: 5]", isCorrect: true }, { icon: "✅", text: "All present.", isCorrect: false }] }
                ]
            }
        };

        function setLanguage(lang) {
            curLang = lang;
            document.getElementById('ui-title').innerText = i18n[lang].title;
            document.getElementById('ui-subtitle').innerText = i18n[lang].subtitle;
            document.getElementById('ui-end-title').innerText = i18n[lang].end;
            document.getElementById('ui-retry').innerText = i18n[lang].retry;
            renderRoles();
        }

        function renderRoles() {
            const grid = document.getElementById('role-grid'); grid.innerHTML = "";
            const icons = ["🛡️", "🎒", "📞", "⛑️", "🧒"];
            const zhNames = ["指揮官", "導師", "通報組", "搶救組", "學生"];
            const enNames = ["Commander", "Teacher", "Comm Group", "Rescue Group", "Student"];
            i18n[curLang].roleNames.forEach((name, idx) => {
                const targetRole = curLang === 'zh' ? zhNames[idx] : enNames[idx];
                grid.innerHTML += `<button onclick="initGame('${targetRole}')" class="btn-option flex-col !items-center !text-center shadow-lg"><span class="text-4xl mb-2">${icons[idx]}</span><span class="font-bold">${name}</span></button>`;
            });
        }

        function initGame(role) {
            curRole = role; curStep = 0;
            document.getElementById('selector-screen').classList.add('hidden');
            document.getElementById('info-bar').classList.remove('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('role-tag').innerText = role;
            renderStep();
        }

        function renderStep() {
            const data = missions[curLang][curRole][curStep];
            document.getElementById('game-time').innerText = `Time: ${data.time}`;
            document.getElementById('mission-title').innerText = data.title;
            document.getElementById('scenario-desc').innerText = data.scenario;
            const list = document.getElementById('options-list'); list.innerHTML = "";
            data.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "btn-option shadow-md";
                btn.innerHTML = `<span class="text-2xl mr-4">${opt.icon}</span><span class="text-sm font-medium">${opt.text}</span>`;
                btn.onclick = () => { 
                    if(opt.isCorrect) { 
                        speak(data.speech, () => { 
                            curStep++; 
                            if(curStep < missions[curLang][curRole].length) renderStep(); 
                            else finish(); 
                        }); 
                    } else { alert(i18n[curLang].alert); }
                };
                list.appendChild(btn);
            });
        }

        function speak(text, cb) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            msg.lang = curLang === 'zh' ? 'zh-TW' : 'en-US';
            msg.voice = voices.find(v => v.lang.includes(msg.lang));
            msg.rate = 0.9;
            msg.onstart = () => document.getElementById('speaking-indicator').classList.remove('hidden');
            msg.onend = () => { document.getElementById('speaking-indicator').classList.add('hidden'); if (cb) cb(); };
            window.speechSynthesis.speak(msg);
        }

        function finish() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('end-text').innerText = i18n[curLang].successMsg;
            const payload = { playerName: "User_" + Math.floor(Math.random()*1000), role: curRole, expected: "8", present: "7", language: curLang };
            fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        }

        function goHome() {
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('selector-screen').classList.remove('hidden');
            setLanguage(curLang);
        }

        window.speechSynthesis.onvoiceschanged = () => { console.log("Voices ready"); };
        setLanguage('zh');
    </script>
</body>
</html>
