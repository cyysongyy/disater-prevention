<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年度辰光國小防災演練系統 - 精確人數版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0F172A; color: white; font-family: 'PingFang TC', sans-serif; }
        .btn-option { transition: all 0.2s; border: 1px solid #334155; text-align: left; padding: 1.25rem; border-radius: 1rem; background: #1E293B; width: 100%; margin-bottom: 0.75rem; display: flex; align-items: center; }
        .btn-option:hover { background-color: #334155; border-color: #A3E635; transform: translateY(-2px); }
        .hidden { display: none; }
        .speech-bubble { background: #A3E635; color: #000; padding: 8px 15px; border-radius: 20px; display: inline-block; margin-bottom: 15px; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- 語言切換 -->
    <div class="w-full max-w-4xl flex justify-end gap-2 mb-4">
        <button onclick="setLanguage('zh')" class="text-xs bg-slate-700 px-4 py-2 rounded-lg hover:bg-lime-500 hover:text-black transition font-bold">中文</button>
        <button onclick="setLanguage('en')" class="text-xs bg-slate-700 px-4 py-2 rounded-lg hover:bg-lime-500 hover:text-black transition font-bold">English</button>
    </div>

    <!-- 頂部狀態 -->
    <div id="info-bar" class="w-full max-w-4xl p-4 mb-6 bg-slate-800 rounded-xl border border-slate-700 flex justify-between items-center hidden">
        <div class="flex items-center">
            <span id="role-tag" class="bg-lime-500 text-black px-2 py-1 rounded text-xs font-bold mr-2"></span>
            <span id="game-time" class="text-slate-400 italic text-sm"></span>
        </div>
        <div id="ui-voice-mode" class="text-xs text-slate-500 font-bold">📢 趴掩穩 (Drop, Cover, Hold on) 模式已開啟</div>
    </div>

    <!-- 1. 角色選擇 -->
    <div id="selector-screen" class="flex-grow flex flex-col items-center justify-center w-full">
        <h1 id="ui-title" class="text-3xl font-black mb-2 text-lime-400 text-center"></h1>
        <p id="ui-subtitle" class="text-slate-400 mb-8 text-center"></p>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 w-full max-w-4xl" id="role-grid"></div>
    </div>

    <!-- 2. 遊戲主畫面 -->
    <div id="game-screen" class="w-full max-w-2xl bg-slate-800 rounded-3xl p-8 shadow-2xl border border-slate-700 hidden">
        <div id="speaking-indicator" class="speech-bubble hidden">📢 Speaking...</div>
        <h2 id="mission-title" class="text-xl font-bold text-lime-400 mb-2 border-l-4 border-lime-500 pl-3"></h2>
        <p id="scenario-desc" class="text-slate-300 leading-relaxed mb-6"></p>
        <div id="options-list"></div>
    </div>

    <!-- 3. 完成畫面 -->
    <div id="end-screen" class="hidden text-center flex-grow flex flex-col justify-center">
        <div class="text-7xl mb-4">🏆</div>
        <h2 id="ui-end-title" class="text-3xl font-black text-lime-400 mb-2"></h2>
        <p id="end-text" class="text-slate-400 mb-8 max-w-md mx-auto"></p>
        <button onclick="goHome()" id="ui-retry" class="bg-lime-500 text-black px-12 py-4 rounded-full font-black hover:bg-lime-400 shadow-lg"></button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby_LIIFkec6wiVn-e0xw2ongOUPX4DsH-lsybkeHzJsHwXnw-A_k4asKxYog77knIj5/exec";
        let curLang = 'zh';
        let curRole = "";
        let curStep = 0;

        const i18n = {
            zh: {
                title: "辰光防災大挑戰",
                subtitle: "依照 115.05.05 腳本執行任務[cite: 5]",
                speaking: "正在播放引導語...",
                end: "演練達成！",
                retry: "回到首頁",
                roleNames: ["指揮官", "導師", "通報組", "搶救組", "學生"],
                alert: "這不符合演練腳本或趴掩穩規範喔！[cite: 5]",
                successMsg: "演練達成！你已成功落實防震三步驟並完成各項避難工作。[cite: 5]"
            },
            en: {
                title: "Chenguang Drill Challenge",
                subtitle: "Follow the 2026.05.05 drill script[cite: 5]",
                speaking: "Voice playing...",
                end: "Mission Accomplished!",
                retry: "Back to Home",
                roleNames: ["Commander", "Teacher", "Comm Group", "Rescue Group", "Student"],
                alert: "This does not follow the drill script or protocol![cite: 5]",
                successMsg: "Success! You implemented the safety steps and completed all tasks.[cite: 5]"
            }
        };

        const missions = {
            "zh": {
                "指揮官": [
                    { time: "09:21", title: "地震覺察掩蔽", scenario: "地震預警聲響起，你在辦公室應採取？", speech: "(執行趴下掩護穩住動作)", options: [{ icon: "🛡️", text: "立即進行就地掩蔽：趴下、掩護、穩住[cite: 5]", isCorrect: true }, { icon: "🏃", text: "趕快跑出辦公室。", isCorrect: false }] },
                    { time: "09:22", title: "下令疏散指令", scenario: "主震稍歇，下令全校師生疏散：", speech: "全校師生請注意，目前地震已暫時停止，請大家保持鎮定不要慌張，請老師運用主震暫歇時間攜帶防災背包及安全頭盔引導學生疏散至綜合球場。", options: [{ icon: "📢", text: "吹哨(一長四短)並廣播疏散指令", isCorrect: true }, { icon: "🏃", text: "大喊疏散。", isCorrect: false }] },
                    { time: "09:23", title: "成立指揮中心", scenario: "抵達球場後，你應採取的行動？", speech: "成立指揮中心並下令：請各班老師開始清點並回報班級人數。", options: [{ icon: "📋", text: "成立指揮中心並下令清點人數", isCorrect: true }, { icon: "✅", text: "宣佈全員安全。", isCorrect: false }] },
                    { time: "09:26", title: "派遣搶救任務", scenario: "接獲二甲回報少一人，你的決策是？", speech: "清點後發現有人受門困於二甲教室，請搶救組派員進行搶救並回報救援狀況。", options: [{ icon: "⛑️", text: "派搶救組進場搜救並回報狀況", isCorrect: true }, { icon: "📞", text: "請通報組去看看。", isCorrect: false }] },
                    { time: "09:29", title: "傷患撤離送醫", scenario: "受困人員救出後，你的後續指令？", speech: "目前受困人員已救回，請搶救組人員撤離建物並協助傷者上救護車送醫。", options: [{ icon: "🚑", text: "下令撤離建物並協助傷者送醫", isCorrect: true }, { icon: "🩺", text: "請護理師自行處理。", isCorrect: false }] }
                ],
                "導師": [
                    { time: "09:21", title: "教室掩蔽引導", scenario: "警報響起，你在教室對學生喊話：", speech: "各位同學不要害怕，請盡量躲進桌下並穩住，保護好頭頸部。", options: [{ icon: "🛡️", text: "安撫學生落實「趴、掩、穩」[cite: 5]", isCorrect: true }, { icon: "🚪", text: "叫大家快跑。", isCorrect: false }] },
                    { time: "09:23", title: "離室清場巡視", scenario: "疏散引導時，為了確保無人受困，你應：", speech: "離開教室大喊：還有沒有人？並留意廁所內狀況。", options: [{ icon: "🚪", text: "大喊清場並確認廁所無人", isCorrect: true }, { icon: "🔒", text: "直接離開。", isCorrect: false }] },
                    { time: "09:26", title: "清點人數回報", scenario: "二甲班級清點人數，發現缺一人，如何回報？", speech: "點名結果：二甲應到 8 人，實到 7 人，1 人失蹤可能受困二甲，請救援。", options: [{ icon: "🚩", text: "舉紅卡報明應到 8 人、實到 7 人", isCorrect: true }, { icon: "✅", text: "回報全員到齊。", isCorrect: false }] }
                ],
                "搶救組": [
                    { time: "09:21", title: "自身防護動作", scenario: "警報響起，搶救組成員應：", speech: "(執行趴下、掩護、穩住動作)", options: [{ icon: "🛡️", text: "立即落實趴下、掩護、穩住[cite: 5]", isCorrect: true }, { icon: "🏃", text: "拿起急救箱逃跑。", isCorrect: false }] },
                    { time: "09:26", title: "校舍巡視回報", scenario: "清點裝備後巡檢校舍，回報內容？", speech: "北棟教室外牆有碎石掉落，南棟、西棟尚無異狀。請求搜救進場。", options: [{ icon: "🏢", text: "回報校舍外觀受損狀況", isCorrect: true }, { icon: "❌", text: "回報全部正常。", isCorrect: false }] },
                    { time: "09:27", title: "進場檢傷詢問", scenario: "進入二甲發現傷患，你的對話是？", speech: "你還好嗎？哪裡覺得不舒服？能動嗎？", options: [{ icon: "🩹", text: "詢問：你還好嗎？能動嗎？", isCorrect: true }, { icon: "🚨", text: "不說話直接背走。", isCorrect: false }] }
                ],
                "通報組": [
                    { time: "09:29", title: "通報 119", scenario: "通報 119 請求支援，你的台詞是？", speech: "本校有 1 位學生受傷，已送至救護站，請求派遣救護車從側門進入支援。", options: [{ icon: "🚑", text: "通報 119：請求救護車由側門進入", isCorrect: true }, { icon: "📱", text: "請由大門進。", isCorrect: false }] }
                ],
                "學生": [
                    { time: "09:21", title: "落實趴掩穩", scenario: "警報響起，身為學生應立即採取的動作？", speech: "進行就地掩蔽(趴下、掩護、穩住)，保護頭頸部。", options: [{ icon: "🛡️", text: "落實「趴下、掩護、穩住」保護頭頸部[cite: 5]", isCorrect: true }, { icon: "🏃", text: "快跑出教室。", isCorrect: false }] },
                    { time: "09:23", title: "疏散三不原則", scenario: "疏散撤離過程中應遵守？", speech: "不推、不語、不跑、不回頭。", options: [{ icon: "🔇", text: "遵守不推、不語、不跑、不回頭", isCorrect: true }, { icon: "🗣️", text: "邊走邊大聲討論。", isCorrect: false }] }
                ]
            },
            "en": {
                "Commander": [
                    { time: "09:21", title: "Drop, Cover, Hold on", scenario: "Alarm rings! First action?", speech: "(Drop, Cover, Hold on)", options: [{ icon: "🛡️", text: "Drop, Cover, Hold on[cite: 5]", isCorrect: true }, { icon: "🏃", text: "Run out.", isCorrect: false }] },
                    { time: "09:26", title: "Rescue Mission", scenario: "1 missing at Room 2A. Decision?", speech: "Rescue group, go to Room 2A and report situation.", options: [{ icon: "⛑️", text: "Order rescue and situation report", isCorrect: true }, { icon: "📞", text: "Wait.", isCorrect: false }] }
                ],
                "Teacher": [
                    { time: "09:26", title: "Roll Call", scenario: "Reporting missing student in Room 2A:", speech: "Room 2A: 8 expected, 7 present, 1 missing at Room 2A.", options: [{ icon: "🚩", text: "Report: 8 expected, 7 present", isCorrect: true }, { icon: "✅", text: "All clear.", isCorrect: false }] }
                ],
                "Rescue Group": [
                    { time: "09:21", title: "Protocol", scenario: "Alarm rings!", speech: "(Drop, Cover, Hold on)", options: [{ icon: "🛡️", text: "Drop, Cover, Hold on[cite: 5]", isCorrect: true }, { icon: "🏃", text: "Run out.", isCorrect: false }] }
                ],
                "Comm Group": [
                    { time: "09:29", title: "Call 119", scenario: "Request to 119:", speech: "Requesting ambulance via SIDE gate.", options: [{ icon: "🚑", text: "Enter through SIDE gate", isCorrect: true }, { icon: "📱", text: "Main gate.", isCorrect: false }] }
                ],
                "Student": [
                    { time: "09:21", title: "Self Safety", scenario: "Alarm rings!", speech: "(Drop, Cover, Hold on)", options: [{ icon: "🛡️", text: "Drop, Cover, Hold on[cite: 5]", isCorrect: true }, { icon: "🏃", text: "Run out.", isCorrect: false }] }
                ]
            }
        };

        function setLanguage(lang) {
            curLang = lang;
            document.getElementById('ui-title').innerText = i18n[lang].title;
            document.getElementById('ui-subtitle').innerText = i18n[lang].subtitle;
            document.getElementById('ui-voice-mode').innerText = i18n[lang].voiceMode;
            document.getElementById('speaking-indicator').innerText = i18n[lang].speaking;
            document.getElementById('ui-end-title').innerText = i18n[lang].end;
            document.getElementById('ui-retry').innerText = i18n[lang].retry;
            renderRoles();
        }

        function renderRoles() {
            const grid = document.getElementById('role-grid'); grid.innerHTML = "";
            const icons = ["🛡️", "🎒", "📞", "⛑️", "🧒"];
            const zhNames = ["指揮官", "導師", "通報組", "搶救組", "學生"];
            const enNames = ["Commander", "Teacher", "Comm Group", "Rescue Group", "Student"];
            i18n[curLang].roleNames.forEach((name, idx) => {
                const targetRole = curLang === 'zh' ? zhNames[idx] : enNames[idx];
                grid.innerHTML += `<button onclick="initGame('${targetRole}')" class="btn-option flex-col !items-center !text-center shadow-lg"><span class="text-4xl mb-2">${icons[idx]}</span><span class="font-bold">${name}</span></button>`;
            });
        }

        function initGame(role) {
            curRole = role; curStep = 0;
            document.getElementById('selector-screen').classList.add('hidden');
            document.getElementById('info-bar').classList.remove('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('role-tag').innerText = role;
            renderStep();
        }

        function renderStep() {
            const data = missions[curLang][curRole][curStep];
            document.getElementById('game-time').innerText = `Time: ${data.time}`;
            document.getElementById('mission-title').innerText = data.title;
            document.getElementById('scenario-desc').innerText = data.scenario;
            const list = document.getElementById('options-list'); list.innerHTML = "";
            data.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "btn-option shadow-md";
                btn.innerHTML = `<span class="text-2xl mr-4">${opt.icon}</span><span class="text-sm font-medium">${opt.text}</span>`;
                btn.onclick = () => { 
                    if(opt.isCorrect) { 
                        speak(data.speech, () => { 
                            curStep++; 
                            if(curStep < missions[curLang][curRole].length) renderStep(); 
                            else finish(); 
                        }); 
                    } else { alert(i18n[curLang].alert); }
                };
                list.appendChild(btn);
            });
        }

        function speak(text, cb) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            if (curLang === 'zh') {
                msg.lang = 'zh-TW';
                msg.voice = voices.find(v => v.lang.includes('zh-TW')) || voices.find(v => v.lang.includes('zh'));
            } else {
                msg.lang = 'en-US';
                msg.voice = voices.find(v => v.lang.includes('en-US')) || voices.find(v => v.lang.includes('en'));
            }
            msg.rate = 0.9;
            msg.onstart = () => document.getElementById('speaking-indicator').classList.remove('hidden');
            msg.onend = () => { document.getElementById('speaking-indicator').classList.add('hidden'); if (cb) cb(); };
            window.speechSynthesis.speak(msg);
        }

        function finish() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('end-text').innerText = i18n[curLang].successMsg;
            const payload = { playerName: "User_" + Math.floor(Math.random()*1000), role: curRole, language: curLang };
            fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        }

        function goHome() {
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('selector-screen').classList.remove('hidden');
            setLanguage(curLang);
        }

        window.speechSynthesis.onvoiceschanged = () => { console.log("Voices loaded"); };
        setLanguage('zh');
    </script>
</body>
</html>
