<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115年度辰光國小防災演練系統 - 指揮官加強版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0F172A; color: white; font-family: 'PingFang TC', sans-serif; }
        .btn-option { transition: all 0.2s; border: 1px solid #334155; text-align: left; padding: 1.25rem; border-radius: 1rem; background: #1E293B; width: 100%; margin-bottom: 0.75rem; display: flex; align-items: center; }
        .btn-option:hover { background-color: #334155; border-color: #A3E635; transform: translateY(-2px); }
        .hidden { display: none; }
        .speech-bubble { background: #A3E635; color: #000; padding: 8px 15px; border-radius: 20px; display: inline-block; margin-bottom: 15px; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- 語言切換 -->
    <div class="w-full max-w-4xl flex justify-end gap-2 mb-4">
        <button onclick="setLanguage('zh')" class="text-xs bg-slate-700 px-4 py-2 rounded-lg hover:bg-lime-500 hover:text-black transition font-bold">中文</button>
        <button onclick="setLanguage('en')" class="text-xs bg-slate-700 px-4 py-2 rounded-lg hover:bg-lime-500 hover:text-black transition font-bold">English</button>
    </div>

    <!-- 頂部狀態 -->
    <div id="info-bar" class="w-full max-w-4xl p-4 mb-6 bg-slate-800 rounded-xl border border-slate-700 flex justify-between items-center hidden">
        <div class="flex items-center">
            <span id="role-tag" class="bg-lime-500 text-black px-2 py-1 rounded text-xs font-bold mr-2"></span>
            <span id="game-time" class="text-slate-400 italic text-sm"></span>
        </div>
        <div id="ui-voice-mode" class="text-xs text-slate-500 font-bold">📢 語音與圖示已開啟</div>
    </div>

    <!-- 1. 角色選擇畫面 -->
    <div id="selector-screen" class="flex-grow flex flex-col items-center justify-center w-full">
        <h1 id="ui-title" class="text-3xl font-black mb-2 text-lime-400 text-center"></h1>
        <p id="ui-subtitle" class="text-slate-400 mb-8 text-center"></p>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 w-full max-w-4xl" id="role-grid"></div>
    </div>

    <!-- 2. 遊戲主畫面 -->
    <div id="game-screen" class="w-full max-w-2xl bg-slate-800 rounded-3xl p-8 shadow-2xl border border-slate-700 hidden">
        <div id="speaking-indicator" class="speech-bubble hidden">📢 Speaking...</div>
        <h2 id="mission-title" class="text-xl font-bold text-lime-400 mb-2 border-l-4 border-lime-500 pl-3"></h2>
        <p id="scenario-desc" class="text-slate-300 leading-relaxed mb-6"></p>
        <div id="options-list"></div>
    </div>

    <!-- 3. 完成畫面 -->
    <div id="end-screen" class="hidden text-center flex-grow flex flex-col justify-center">
        <div class="text-7xl mb-4">🏆</div>
        <h2 id="ui-end-title" class="text-3xl font-black text-lime-400 mb-2"></h2>
        <p id="end-text" class="text-slate-400 mb-8 max-w-md mx-auto"></p>
        <button onclick="goHome()" id="ui-retry" class="bg-lime-500 text-black px-12 py-4 rounded-full font-black hover:bg-lime-400 shadow-lg"></button>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby_LIIFkec6wiVn-e0xw2ongOUPX4DsH-lsybkeHzJsHwXnw-A_k4asKxYog77knIj5/exec";
        let curLang = 'zh';
        let curRole = "";
        let curStep = 0;

        const i18n = {
            zh: {
                title: "辰光防災大挑戰",
                subtitle: "依照 115.05.05 腳本執行任務[cite: 6]",
                voiceMode: "📢 語音與圖示已開啟",
                speaking: "正在播放引導語...",
                end: "演練成功！",
                retry: "回到首頁",
                roleNames: ["指揮官", "導師", "通報組", "搶救組", "學生"],
                alert: "這不符合演練腳本喔！[cite: 6]",
                successMsg: "演練達成！依照腳本成功撤離至綜合球場。[cite: 6]"
            },
            en: {
                title: "Chenguang Disaster Challenge",
                subtitle: "Follow the 2026.05.05 drill script[cite: 6]",
                voiceMode: "📢 Voice & Icons On",
                speaking: "Voice playing...",
                end: "Mission Accomplished!",
                retry: "Back to Home",
                roleNames: ["Commander", "Teacher", "Comm Group", "Rescue Group", "Student"],
                alert: "This does not follow the drill script![cite: 6]",
                successMsg: "Success! Safely evacuated to the ball court according to script.[cite: 6]"
            }
        };

        const missions = {
            "zh": {
                "指揮官": [
                    { time: "09:21", title: "地震覺察[cite: 6]", scenario: "地震預警聲響起，你在校長室應採取？", speech: "(執行趴下掩護穩住動作)", options: [{ icon: "🛡️", text: "立即進行就地掩蔽(趴掩穩)[cite: 6]", isCorrect: true }, { icon: "🏃", text: "趕快跑出辦公室。", isCorrect: false }] },
                    { time: "09:22", title: "下令疏散[cite: 6]", scenario: "主震稍歇，你必須正式下令全校疏散：", speech: "全校師生請注意，目前地震已暫時停止，請大家保持鎮定不要慌張，請老師運用主震暫歇時間攜帶防災背包及安全頭盔引導學生疏散至綜合球場。", options: [{ icon: "📢", text: "吹哨(一長四短)並發布廣播指令[cite: 6]", isCorrect: true }, { icon: "🏃", text: "大喊：大家撤離！", isCorrect: false }] },
                    { time: "09:23", title: "清點人數[cite: 6]", scenario: "抵達綜合球場成立指揮中心後：", speech: "請各班老師開始清點並回報班級人數。", options: [{ icon: "📋", text: "下令各班老師開始清點人數[cite: 6]", isCorrect: true }, { icon: "✅", text: "直接宣佈全員安全。", isCorrect: false }] },
                    { time: "09:26", title: "派遣搶救任務[cite: 6]", scenario: "清點後發現二甲教室有人受困，你的指令是？", speech: "請各班老師及各組組長開始清點並回報人數。清點後發現有人受困於二甲教室，請搶救組派員進行搶救並回報救援狀況。", options: [{ icon: "⛑️", text: "派員搶救並要求回報救援狀況[cite: 6]", isCorrect: true }, { icon: "📞", text: "請通報組去看看。", isCorrect: false }] },
                    { time: "09:29", title: "救出與撤離[cite: 6]", scenario: "接獲受困人員救回消息，後續指令？", speech: "目前受困人員已救回，請搶救組人員撤離建物。", options: [{ icon: "🏗️", text: "指示搶救組人員撤離建物[cite: 6]", isCorrect: true }, { icon: "⏳", text: "要求留在原處待命。", isCorrect: false }] },
                    { time: "09:29", title: "傷患送醫指令[cite: 6]", scenario: "對於受傷學生，你如何指示？", speech: "請搶救組人員協助傷者上救護車送醫。", options: [{ icon: "🚑", text: "指示協助傷者上救護車送醫[cite: 6]", isCorrect: true }, { icon: "🏥", text: "請家長來帶回。", isCorrect: false }] },
                    { time: "09:30", title: "災後通報決策[cite: 6]", scenario: "最後，評估校舍後你決定？", speech: "評估校舍損壞情形後，召集組長討論下令暫時停止上課集中安置。", options: [{ icon: "🏢", text: "討論後下令停止上課集中安置[cite: 6]", isCorrect: true }, { icon: "🔔", text: "直接宣佈解散。", isCorrect: false }] }
                ],
                "通報組": [
                    { time: "09:29", title: "119通知[cite: 6]", scenario: "撥打 119 通報傷患送醫細節：", speech: "本校因地震影響有 1 位學生受傷，目前已送至救護站進行初步處理，請求派遣救護車從側門進入支援。", options: [{ icon: "🚑", text: "請求救護車從側門進入支援[cite: 6]", isCorrect: true }, { icon: "📱", text: "請救護車隨便找個門進。", isCorrect: false }] }
                ],
                "導師": [
                    { time: "09:21", title: "就地安撫[cite: 6]", scenario: "地震發生，於教室安撫學生：", speech: "各位同學不要害怕，請盡量躲進桌下並穩住，保護好頭頸部。", options: [{ icon: "🛡️", text: "安撫：躲進桌下穩住保護頭頸部[cite: 6]", isCorrect: true }, { icon: "🚪", text: "大家快跑！", isCorrect: false }] }
                ],
                "搶救組": [
                    { time: "09:27", title: "搜救檢傷[cite: 6]", scenario: "在二甲發現傷患，你的對話是？", speech: "你還好嗎？哪裡覺得不舒服？能動嗎？", options: [{ icon: "🩹", text: "進行詢問：你還好嗎？能動嗎？[cite: 6]", isCorrect: true }, { icon: "🏃", text: "不說話直接背走。", isCorrect: false }] }
                ],
                "學生": [
                    { time: "09:23", title: "疏散原則[cite: 6]", scenario: "依指示逃生時應遵守？", speech: "不推、不語、不跑、不回頭。", options: [{ icon: "🔇", text: "遵守不推、不語、不跑、不回頭[cite: 6]", isCorrect: true }, { icon: "🗣️", text: "邊走邊大聲聊天。", isCorrect: false }] }
                ]
            },
            "en": {
                "Commander": [
                    { time: "09:21", title: "Drop, Cover, Hold on[cite: 6]", scenario: "Earthquake starts, what do you do in your office?", speech: "(Performing Drop, Cover, Hold on)", options: [{ icon: "🛡️", text: "Drop, Cover, Hold on[cite: 6]", isCorrect: true }, { icon: "🏃", text: "Run outside.", isCorrect: false }] },
                    { time: "09:22", title: "Broadcast Command[cite: 6]", scenario: "Shock stopped, give order:", speech: "Attention everyone, the earthquake has stopped. Please follow teachers to the ball court.", options: [{ icon: "📢", text: "Whistle & Broadcast evacuation[cite: 6]", isCorrect: true }, { icon: "🏃", text: "Run now!", isCorrect: false }] },
                    { time: "09:26", title: "Rescue Mission[cite: 6]", scenario: "Someone trapped at Room 2A. Your order?", speech: "Rescue group, please go to Room 2A for search and rescue, and report the situation back.", options: [{ icon: "⛑️", text: "Order rescue and situation report[cite: 6]", isCorrect: true }, { icon: "📞", text: "Tell everyone to wait.", isCorrect: false }] },
                    { time: "09:29", title: "Evacuation Order[cite: 6]", scenario: "Student rescued, now what?", speech: "Person rescued. Rescue team, please evacuate from the building.", options: [{ icon: "🏗️", text: "Order rescue team to leave building[cite: 6]", isCorrect: true }, { icon: "⏳", text: "Wait inside.", isCorrect: false }] },
                    { time: "09:29", title: "Medical Support[cite: 6]", scenario: "For the injured student:", speech: "Rescue team, please assist the injured student onto the ambulance.", options: [{ icon: "🚑", text: "Assist student onto ambulance[cite: 6]", isCorrect: true }, { icon: "🏥", text: "Go home.", isCorrect: false }] }
                ],
                "Comm Group": [
                    { time: "09:29", title: "Call 119[cite: 6]", scenario: "Reporting injury to 119:", speech: "One student is injured. Ambulance requested to enter via side gate.", options: [{ icon: "🚑", text: "Enter through Main Gate[cite: 6]", isCorrect: true }, { icon: "📱", text: "Back gate.", isCorrect: false }] }
                ],
                "Teacher": [
                    { time: "09:21", title: "Comforting[cite: 6]", scenario: "Instructing class during quake:", speech: "Don't be afraid. Get under the table and protect your head.", options: [{ icon: "🛡️", text: "Protect head and neck[cite: 6]", isCorrect: true }, { icon: "🏃", text: "Run out!", isCorrect: false }] }
                ],
                "Rescue Group": [
                    { time: "09:27", title: "Triage[cite: 6]", scenario: "Found the student, your question?", speech: "Are you okay? Where does it hurt? Can you move?", options: [{ icon: "🩹", text: "Ask: Can you move?[cite: 6]", isCorrect: true }, { icon: "💪", text: "Get up now.", isCorrect: false }] }
                ],
                "Student": [
                    { time: "09:23", title: "Rules[cite: 6]", scenario: "Rules during evacuation:", speech: "No push, no talk, no run, no look back.", options: [{ icon: "🔇", text: "No push, no talk, no run[cite: 6]", isCorrect: true }, { icon: "🗣️", text: "Talk loudly.", isCorrect: false }] }
                ]
            }
        };

        function setLanguage(lang) {
            curLang = lang;
            document.getElementById('ui-title').innerText = i18n[lang].title;
            document.getElementById('ui-subtitle').innerText = i18n[lang].subtitle;
            document.getElementById('ui-voice-mode').innerText = i18n[lang].voiceMode;
            document.getElementById('speaking-indicator').innerText = i18n[lang].speaking;
            document.getElementById('ui-end-title').innerText = i18n[lang].end;
            document.getElementById('ui-retry').innerText = i18n[lang].retry;
            renderRoles();
        }

        function renderRoles() {
            const grid = document.getElementById('role-grid');
            grid.innerHTML = "";
            const icons = ["🛡️", "🎒", "📞", "⛑️", "🧒"];
            const zhNames = ["指揮官", "導師", "通報組", "搶救組", "學生"];
            const enNames = ["Commander", "Teacher", "Comm Group", "Rescue Group", "Student"];
            
            i18n[curLang].roleNames.forEach((name, idx) => {
                const targetRole = curLang === 'zh' ? zhNames[idx] : enNames[idx];
                grid.innerHTML += `<button onclick="initGame('${targetRole}')" class="btn-option flex-col !items-center !text-center shadow-lg"><span class="text-4xl mb-2">${icons[idx]}</span><span class="font-bold">${name}</span></button>`;
            });
        }

        function initGame(role) {
            curRole = role; 
            curStep = 0;
            document.getElementById('selector-screen').classList.add('hidden');
            document.getElementById('info-bar').classList.remove('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('role-tag').innerText = role;
            renderStep();
        }

        function renderStep() {
            const data = missions[curLang][curRole][curStep];
            document.getElementById('game-time').innerText = `Time: ${data.time}`;
            document.getElementById('mission-title').innerText = data.title;
            document.getElementById('scenario-desc').innerText = data.scenario;
            const list = document.getElementById('options-list');
            list.innerHTML = "";
            data.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "btn-option shadow-md";
                btn.innerHTML = `<span class="text-2xl mr-4">${opt.icon}</span><span class="text-sm font-medium">${opt.text}</span>`;
                btn.onclick = () => { 
                    if(opt.isCorrect) { 
                        speak(data.speech, () => { 
                            curStep++; 
                            if(curStep < missions[curLang][curRole].length) renderStep(); 
                            else finish(); 
                        }); 
                    } else {
                        alert(i18n[curLang].alert);
                    }
                };
                list.appendChild(btn);
            });
        }

        function speak(text, cb) {
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            const voices = window.speechSynthesis.getVoices();
            if (curLang === 'zh') {
                msg.lang = 'zh-TW';
                msg.voice = voices.find(v => v.lang.includes('zh-TW')) || voices.find(v => v.lang.includes('zh'));
            } else {
                msg.lang = 'en-US';
                msg.voice = voices.find(v => v.lang.includes('en-US')) || voices.find(v => v.lang.includes('en'));
            }
            msg.rate = 0.85;
            msg.onstart = () => document.getElementById('speaking-indicator').classList.remove('hidden');
            msg.onend = () => { 
                document.getElementById('speaking-indicator').classList.add('hidden'); 
                if (cb) cb(); 
            };
            window.speechSynthesis.speak(msg);
        }

        function finish() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('end-text').innerText = i18n[curLang].successMsg;
            const payload = { playerName: "User_" + Math.floor(Math.random()*1000), role: curRole, totalTime: "05:00", successRate: "100%", missingFound: "是", commStatus: "是", language: curLang };
            fetch(SCRIPT_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(payload) });
        }

        function goHome() {
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('selector-screen').classList.remove('hidden');
            setLanguage(curLang);
        }

        window.speechSynthesis.onvoiceschanged = () => { console.log("Voices loaded"); };
        setLanguage('zh');
    </script>
</body>
</html>
